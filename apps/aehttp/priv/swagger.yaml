          contract:
            description: Contract address
            $ref: '#/definitions/EncodedPubkey'
          abi_version:
            $ref: '#/definitions/UInt16'
          amount:
            $ref: '#/definitions/UInt'
          gas:
            $ref: '#/definitions/UInt64'
          gas_price:
            $ref: '#/definitions/UInt'
          call_data:
            description: Contract call data
            $ref: '#/definitions/EncodedByteArray'
        required:
          - caller
          - contract
          - abi_version
          - amount
          - call_data
          - gas
          - gas_price
  OffChainDeposit:
    allOf:
      - $ref: '#/definitions/OffChainUpdate'
      - type: object
        properties:
          from:
            description: Depositor of tokens
            $ref: '#/definitions/EncodedPubkey'
          amount:
            $ref: '#/definitions/UInt'
        required:
          - from
          - amount
  OffChainNewContract:
    allOf:
      - $ref: '#/definitions/OffChainUpdate'
      - type: object
        properties:
          owner:
            description: Contract owner
            $ref: '#/definitions/EncodedPubkey'
          vm_version:
            $ref: '#/definitions/UInt16'
          abi_version:
            $ref: '#/definitions/UInt16'
          code:
            $ref: '#/definitions/ByteCode'
          deposit:
            $ref: '#/definitions/UInt'
          call_data:
            description: Contract call data
            $ref: '#/definitions/EncodedByteArray'
        required:
          - owner
          - vm_version
          - abi_version
          - code
          - deposit
          - call_data
  OffChainTransfer:
    allOf:
      - $ref: '#/definitions/OffChainUpdate'
      - type: object
        properties:
          from:
            description: Sender of tokens
            $ref: '#/definitions/EncodedPubkey'
          to:
            description: Receiver of tokens
            $ref: '#/definitions/EncodedPubkey'
          amount:
            $ref: '#/definitions/UInt'
        required:
          - from
          - to
          - amount
  OffChainUpdate:
    type: object
    discriminator: op
    properties:
      op:
