    properties:
      key_block:
        $ref: '#/definitions/KeyBlock'
      micro_blocks:
        type: array
        items:
          $ref: '#/definitions/EncodedPubkey'
    required:
      - key_block
      - micro_blocks
  GenericSignedTx:
    type: object
    properties:
      tx:
        $ref: '#/definitions/GenericTx'
      block_height:
        $ref: '#/definitions/TxBlockHeight'
      block_hash:
        description: 'Value "none" means no block in the chain includes the transaction'
        $ref: '#/definitions/EncodedHash'
      hash:
        $ref: '#/definitions/EncodedHash'
      encoded_tx:
        $ref: '#/definitions/EncodedByteArray'
      signatures:
        description: 'At least one signature is required unless for Generalized Account Meta transactions'
        type: array
        items:
          $ref: '#/definitions/EncodedValue'
    required:
      - tx
      - block_height
      - block_hash
      - hash
  GenericTx:
    type: object
    discriminator: type
    properties:
      version:
        $ref: '#/definitions/UInt32'
      type:
        type: string
    required:
      - version
      - type
  GenericTxs:
    type: object
    properties:
      transactions:
        type: array
        items:
          $ref: '#/definitions/GenericSignedTx'
    required:
      - transactions
  KeyBlock:
    type: object
    properties:
      hash:
        $ref: '#/definitions/EncodedHash'
      height:
        $ref: '#/definitions/UInt64'
      prev_hash:
        $ref: '#/definitions/EncodedHash'
      prev_key_hash:
        $ref: '#/definitions/EncodedHash'
      state_hash:
        $ref: '#/definitions/EncodedHash'
      miner:
        $ref: '#/definitions/EncodedPubkey'
      beneficiary:
        $ref: '#/definitions/EncodedPubkey'
      target:
        $ref: '#/definitions/UInt32'
      pow:
        $ref: '#/definitions/Pow'
      nonce:
        $ref: '#/definitions/UInt64'
      time:
        $ref: '#/definitions/UInt64'
      version:
        $ref: '#/definitions/UInt32'
      info:
        $ref: '#/definitions/EncodedByteArray'
    required:
      - hash
      - height
      - prev_hash
      - prev_key_hash
      - state_hash
      - miner
      - beneficiary
      - target
      - time
      - version
      - info
  KeyBlockOrMicroBlockHeader:
    type: object
    properties:
      key_block:
        $ref: '#/definitions/KeyBlock'
      micro_block:
        $ref: '#/definitions/MicroBlockHeader'
  MicroBlockHeader:
    type: object
    properties:
      hash:
        $ref: '#/definitions/EncodedHash'
      height:
        $ref: '#/definitions/UInt64'
      pof_hash:
        description: '"no_fraud" | api encoded Proof of Fraud hash'
        $ref: '#/definitions/EncodedHash'
      prev_hash:
        $ref: '#/definitions/EncodedHash'
      prev_key_hash:
        $ref: '#/definitions/EncodedHash'
      state_hash:
        $ref: '#/definitions/EncodedHash'
      txs_hash:
        $ref: '#/definitions/EncodedHash'
      signature:
        $ref: '#/definitions/EncodedValue'
      time:
        $ref: '#/definitions/UInt64'
      version:
        $ref: '#/definitions/UInt32'
    required:
      - hash
      - height
      - pof_hash
      - prev_hash
      - prev_key_hash
      - state_hash
      - txs_hash
      - signature
      - time
      - version
  NameClaimTx:
    type: object
    properties:
      name:
        type: string
      name_salt:
        $ref: '#/definitions/UInt'
      name_fee:
        $ref: '#/definitions/UInt'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - name
      - name_salt
      - fee
      - account_id
  NameClaimTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/NameClaimTx'
  NameEntry:
    type: object
    properties:
      id:
        $ref: '#/definitions/EncodedValue'
      owner:
        $ref: '#/definitions/EncodedPubkey'
      ttl:
        $ref: '#/definitions/UInt64'
      pointers:
        type: array
        items:
          $ref: '#/definitions/NamePointer'
    required:
      - id
      - ttl
      - pointers
  NameHash:
    type: object
    properties:
      name_id:
        $ref: '#/definitions/EncodedValue'
    required:
      - name_id
  NamePointer:
    type: object
    properties:
      key:
        type: string
