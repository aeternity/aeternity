        $ref: '#/definitions/EncodedPubkey'
    required:
      - key
      - id
  NamePreclaimTx:
    type: object
    properties:
      commitment_id:
        $ref: '#/definitions/EncodedValue'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - commitment_id
      - fee
      - account_id
  NamePreclaimTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
