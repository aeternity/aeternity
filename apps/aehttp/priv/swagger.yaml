  NameRevokeTx:
    type: object
    properties:
      name_id:
        $ref: '#/definitions/EncodedValue'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - name_id
      - fee
      - account_id
  NameRevokeTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/NameRevokeTx'
  NameTransferTx:
    type: object
    properties:
      name_id:
        $ref: '#/definitions/EncodedValue'
      recipient_id:
        $ref: '#/definitions/EncodedPubkey'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - name_id
      - recipient_id
      - fee
      - account_id
  NameTransferTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/NameTransferTx'
  NameUpdateTx:
    type: object
    properties:
      name_id:
        $ref: '#/definitions/EncodedValue'
      name_ttl:
        $ref: '#/definitions/UInt64'
      pointers:
        type: array
        items:
          $ref: '#/definitions/NamePointer'
      client_ttl:
        $ref: '#/definitions/UInt64'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - name_id
      - name_ttl
      - client_ttl
      - pointers
      - fee
      - account_id
  NameUpdateTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/NameUpdateTx'
  NetworkStatus:
    type: object
    additionalProperties:
      $ref: '#/definitions/PeerDetails'
  OffChainCallContract:
    allOf:
      - $ref: '#/definitions/OffChainUpdate'
