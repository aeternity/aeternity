          - to
          - amount
  OracleExtendTx:
    type: object
    properties:
      fee:
        $ref: '#/definitions/UInt'
      oracle_ttl:
        $ref: '#/definitions/RelativeTTL'
      oracle_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
      ttl:
        $ref: '#/definitions/UInt64'
    required:
      - fee
      - oracle_ttl
      - oracle_id
  OracleExtendTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/OracleExtendTx'
  OracleQueries:
    type: object
    properties:
      oracle_queries:
        type: array
        items:
          $ref: '#/definitions/OracleQuery'
    required:
      - oracle_queries
  OracleQuery:
    type: object
    properties:
      id:
        $ref: '#/definitions/EncodedValue'
      sender_id:
        $ref: '#/definitions/EncodedPubkey'
      sender_nonce:
        $ref: '#/definitions/UInt64'
      oracle_id:
        $ref: '#/definitions/EncodedPubkey'
      query:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      response:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      ttl:
        $ref: '#/definitions/UInt64'
      response_ttl:
        $ref: '#/definitions/TTL'
      fee:
        $ref: '#/definitions/UInt'
    required:
      - id
      - sender_id
      - sender_nonce
      - oracle_id
      - query
      - response
      - ttl
      - response_ttl
      - fee
  OracleQueryTx:
    type: object
    properties:
      oracle_id:
        $ref: '#/definitions/EncodedPubkey'
      query:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      query_fee:
        $ref: '#/definitions/UInt'
      query_ttl:
        $ref: '#/definitions/TTL'
      response_ttl:
        $ref: '#/definitions/RelativeTTL'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      sender_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        description: 'Sender nonce'
        $ref: '#/definitions/UInt64'
    required:
      - oracle_id
      - query
      - query_fee
      - query_ttl
      - response_ttl
      - fee
      - sender_id
  OracleQueryTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/OracleQueryTx'
  OracleRegisterTx:
    type: object
    properties:
      query_format:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      response_format:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      query_fee:
        $ref: '#/definitions/UInt'
      oracle_ttl:
        $ref: '#/definitions/TTL'
      account_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      abi_version:
        $ref: '#/definitions/UInt16'
    required:
      - query_format
      - response_format
      - query_fee
      - fee
      - oracle_ttl
      - account_id
  OracleRegisterTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/OracleRegisterTx'
  OracleRespondTx:
    type: object
    properties:
      query_id:
        $ref: '#/definitions/EncodedValue'
      response:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      response_ttl:
        $ref: '#/definitions/RelativeTTL'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      oracle_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
    required:
      - query_id
      - response
      - response_ttl
      - fee
      - oracle_id
  OracleResponseTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/OracleRespondTx'
  PayingForTx:
    type: object
    properties:
      payer_id:
        $ref: '#/definitions/EncodedPubkey'
      fee:
        $ref: '#/definitions/UInt'
      nonce:
        $ref: '#/definitions/UInt64'
      tx:
        $ref: '#/definitions/SignedTx'
    required:
      - payer_id
      - fee
      - tx
  PayingForTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/PayingForTx'
  Peer:
    type: string
    description: 'Aeternity node'
  PeerConnections:
    type: object
    properties:
      inbound:
        description: 'Number of inbound peer connections'
        $ref: '#/definitions/UInt32'
      outbound:
        description: 'Number of outbound peer connections'
        $ref: '#/definitions/UInt32'
    required:
      - inbound
      - outbound
  PeerDetails:
    type: object
    properties:
      host:
        description: 'Hostname of peer'
        type: string
      port:
        description: 'Port of peer'
        $ref: '#/definitions/UInt32'
      first_seen:
        description: 'Unix timestamp of when the peer was first pinged'
        $ref: '#/definitions/UInt32'
      last_seen:
        description: 'Unix timestamp of when the peer was last pinged'
        $ref: '#/definitions/UInt32'
      genesis_hash:
        description: 'The genesis hash the remote node reports'
        $ref: '#/definitions/EncodedHash'
      top_hash:
        description: 'The top hash the remote node reports'
        $ref: '#/definitions/EncodedHash'
      top_difficulty:
        description: 'The total top difficulty the node reports'
        $ref: '#/definitions/UInt64'
      network_id:
        type: string
      node_version:
        type: string
      node_revision:
        type: string
      node_vendor:
        type: string
      node_os:
        type: string
    required:
      - host
      - port
      - first_seen
      - last_seen
      - genesis_hash
      - top_hash
      - top_difficulty
  PeerPubKey:
    type: object
    properties:
      pubkey:
        $ref: '#/definitions/EncodedPubkey'
    required:
      - pubkey
  Peers:
    type: object
    properties:
      peers:
        type: array
        description: All discovered peers
        items:
          $ref: '#/definitions/Peer'
      blocked:
        type: array
        description: All blocked peers
        items:
          $ref: '#/definitions/Peer'
    required:
      - peers
      - blocked
  PoI:
    type: object
    properties:
      poi:
        description: Proof of inclusion
        $ref: '#/definitions/EncodedByteArray'
    required:
      - poi
  PostTxResponse:
    type: object
    properties:
      tx_hash:
        description: 'Hash of a signed transaction'
        $ref: '#/definitions/EncodedHash'
    required:
      - tx_hash
  Pow:
    type: array
    items:
      $ref: '#/definitions/UInt32'
    minItems: 42
    maxItems: 42
  Protocol:
    type: object
    properties:
      version:
        description: 'Protocol version (can include protocol activated by miner signalling)'
        $ref: '#/definitions/UInt32'
      effective_at_height:
        description: 'Height at which protocol becomes active'
        $ref: '#/definitions/UInt64'
    required:
      - version
      - effective_at_height
  PubKey:
    type: object
    properties:
      pub_key:
        $ref: '#/definitions/EncodedPubkey'
    required:
      - pub_key
  RegisteredOracle:
    type: object
    properties:
      id:
        $ref: '#/definitions/EncodedPubkey'
      query_format:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      response_format:
        # Depending on ABI version it might be a EncodedByteArray
        type: string
      query_fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      abi_version:
        $ref: '#/definitions/UInt16'
    required:
      - id
      - query_format
      - response_format
      - query_fee
      - ttl
      - abi_version
  RelativeTTL:
    type: object
    properties:
      type:
        type: string
        enum: ["delta"]
      value:
        $ref: '#/definitions/UInt64'
    required:
      - type
      - value
  SignedTx:
    type: object
    properties:
      tx:
        $ref: '#/definitions/GenericTx'
      signatures:
        description: 'At least one signature is required unless for Generalized Account Meta transactions'
        type: array
        minItems: 0
        items:
          $ref: '#/definitions/EncodedValue'
    required:
      - tx
      - signatures
  SpendTx:
    $ref: '#/definitions/SpendTxInput'
  SpendTxInput:
    type: object
    properties:
      recipient_id:
        $ref: '#/definitions/EncodedPubkey'
      amount:
        $ref: '#/definitions/UInt'
      fee:
        $ref: '#/definitions/UInt'
      ttl:
        $ref: '#/definitions/UInt64'
      sender_id:
        $ref: '#/definitions/EncodedPubkey'
      nonce:
        $ref: '#/definitions/UInt64'
      payload:
        $ref: '#/definitions/EncodedByteArray'
    required:
      - recipient_id
      - amount
      - fee
      - sender_id
      - payload
  SpendTxJSON:
    allOf:
      - $ref: '#/definitions/GenericTx'
      - $ref: '#/definitions/SpendTx'
  Status:
    type: object
    properties:
      genesis_key_block_hash:
        $ref: '#/definitions/EncodedHash'
      solutions:
        $ref: '#/definitions/UInt64'
      difficulty:
        $ref: '#/definitions/UInt64'
      hashrate:
        $ref: '#/definitions/UInt64'
      syncing:
        type: boolean
      sync_progress:
        type: number
        format: float
        minimum: 0.0
        maximum: 100.0
      uptime:
        type: string
      listening:
        type: boolean
      protocols:
        type: array
        items:
          $ref: '#/definitions/Protocol'
      node_version:
        type: string
      node_revision:
        type: string
      peer_count:
        $ref: '#/definitions/UInt32'
      peer_connections:
        $ref: '#/definitions/PeerConnections'
      pending_transactions_count:
        $ref: '#/definitions/UInt32'
      network_id:
        type: string
      peer_pubkey:
        $ref: '#/definitions/EncodedPubkey'
      top_key_block_hash:
        $ref: '#/definitions/EncodedHash'
      top_block_height:
        $ref: '#/definitions/UInt64'
    required:
      - genesis_key_block_hash
      - solutions
      - difficulty
      - hashrate
      - syncing
      - uptime
      - listening
      - protocols
      - node_version
      - node_revision
      - peer_count
      - peer_connections
      - pending_transactions_count
      - network_id
      - peer_pubkey
      - top_key_block_hash
      - top_block_height
  SyncStatus:
    type: object
    properties:
      progress:
        type: number
      target:
        $ref: "#/definitions/UInt64"
      speed:
        type: number
      estimate:
        $ref: "#/definitions/UInt64"
    required:
      - progress
      - target
      - speed
      - estimate
  TTL:
    type: object
    properties:
      type:
        type: string
        enum: ["delta", "block"]
      value:
        $ref: '#/definitions/UInt64'
    required:
      - type
      - value
  TokenSupply:
    type: object
    properties:
      accounts:
        description: Tokens in account balances
        $ref: '#/definitions/UInt'
      contracts:
        description: Tokens in contracts
        $ref: '#/definitions/UInt'
      contract_oracles:
        description: Tokens in contracts registered as oracles
        $ref: '#/definitions/UInt'
      locked:
        description: Tokens locked (not owned by anyone)
        $ref: '#/definitions/UInt'
      oracles:
        description: Tokens in accounts registered as oracles
        $ref: '#/definitions/UInt'
      oracle_queries:
        description: Tokens in pending oracle queries
        $ref: '#/definitions/UInt'
      pending_rewards:
        description: Tokens from fees and coinbase pending in the beneficiary reward delay
        $ref: '#/definitions/UInt'
      total:
        description: Sum of all tokens from other fields
        $ref: '#/definitions/UInt'
  Tx:
    type: object
    properties:
      tx:
        $ref: '#/definitions/EncodedByteArray'
    required:
      - tx
  # Block height is special, it can be either a UInt64 or -1 to indicate
  # that a transaction isn't yet in a block
  TxBlockHeight:
    type: integer
    minimum: -1
    maximum: 18446744073709551615
  TxEvent:
    type: object
  TxInfoObject:
    type: object
    properties:
      call_info:
        $ref: '#/definitions/ContractCallObject'
      ga_info:
        $ref: '#/definitions/GAObject'
      tx_info:
        type: string
  # Swagger doesn't have any proper integer types, we mainly use four
  # different unsigned integers
  #  * UInt - unbound unsigned integers
  #  * UInt16 - 16-bit unsigned integers
  #  * UInt32 - 32-bit unsigned integers
  #  * UInt64 - 64-bit unsigned integers
  UInt:
    type: integer
    minimum: 0
  UInt16:
    type: integer
    minimum: 0
    maximum: 65535
  UInt32:
    type: integer
    minimum: 0
    maximum: 4294967295
  UInt64:
    type: integer
    minimum: 0
    maximum: 18446744073709551615
  UnsignedTx:
    type: object
    properties:
      tx:
        description: Unsigned transaction object
        $ref: '#/definitions/EncodedByteArray'
    required:
      - tx
externalDocs:
  description: Find out more about Aeternity
  url: 'http://www.aeternity.com'
