swagger: '2.0'
info:
  description: 'This is the [Aeternity](https://www.aeternity.com/) node API. The swagger version of this API will be deprecated and replaced by an openAPI 3.x specification'
  version: x.y.z
  title: Aeternity node
  termsOfService: 'https://www.aeternity.com/terms/'
  contact:
    url: 'https://github.com/aeternity/aeternity/issues'
basePath: /v2
tags:
  - name: external
    description: External API
  - name: internal
    description: Internal API
  - name: chain
    description: Chain related endpoints
  - name: transaction
    description: Transaction related endpoints
  - name: account
    description: Account related endpoints
  - name: contract
    description: Contract related endpoints
  - name: oracle
    description: Oracle related endpoints
  - name: name_service
    description: Name service related endpoints
  - name: channel
    description: State channel related endpoints
  - name: node_info
    description: Node information related endpoints
  - name: debug
    description: Debug endpoints
  - name: obsolete
    description: Old endpoints that will be removed
schemes:
  - http
paths:
  ###
  ## External APIs definitions
  ###
  /accounts/{pubkey}:
    get:
      tags:
        - external
        - account
      operationId: GetAccountByPubkey
      description: 'Get an account by public key'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the account'
          required: true
          # Encoded account pubkey 'ak_...'
          # pattern: "^ak_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Account'
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Account not found'
          schema:
            $ref: '#/definitions/Error'
  /accounts/{pubkey}/hash/{hash}:
    get:
      tags:
        - external
        - account
      operationId: GetAccountByPubkeyAndHash
      description: 'Get an account by public key after the block indicated by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the account'
          required: true
          # Encoded account pubkey 'ak_...'
          # pattern: "^ak_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded block hash 'kh_...'/'mh_...'
          # pattern: "^(kh|mh)_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Account'
        '400':
          description: 'Invalid public key or invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Account not found or hash not available'
          schema:
            $ref: '#/definitions/Error'
  /accounts/{pubkey}/height/{height}:
    get:
      tags:
        - external
        - account
      operationId: GetAccountByPubkeyAndHeight
      description: 'Get an account by public key after the opening key block of the generation at height'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the account'
          required: true
          # Encoded account pubkey 'ak_...'
          # pattern: "^ak_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: path
          name: height
          description: 'The height'
          required: true
          # UInt64
          type: integer
          minimum: 0
          maximum: 18446744073709551615
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Account'
        '400':
          description: 'Invalid public key or invalid height'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Account not found or height not available'
          schema:
            $ref: '#/definitions/Error'
  /accounts/{pubkey}/next-nonce:
    get:
      tags:
        - external
        - account
      operationId: GetAccountNextNonce
      description: "Get an account's next nonce; This is computed according to whatever is the current account nonce and what transactions are currently present in the transaction pool"
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the account'
          required: true
          type: string
        - in: query
          name: strategy
          description: "What strategy to use in order to determine the next nonce: shall it check for continuity or return the largest nonce seen + 1. If you choose strategy max, then the greatest nonce seen in the account or currently in the transaction pool is incremented with 1 and returned. If you choose the strategy continuity, then transactions in the mempool are checked if there are gaps - missing nonces that prevent transactions with greater nonces to get included."
          required: false
          default: max
          type: string
          enum: [max, continuity]
      responses:
        '200':
          description: 'Successful operation'
          schema:
            type: object
            properties:
              next_nonce:
                type: integer
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Account not found'
          schema:
            $ref: '#/definitions/Error'
  /accounts/{pubkey}/transactions/pending:
    get:
      tags:
        - external
        - account
      operationId: GetPendingAccountTransactionsByPubkey
      description: 'Get pending account transactions by public key'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the account'
          required: true
          # Encoded transaction hash
          # pattern: "^th_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/GenericTxs'
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Account not found'
          schema:
            $ref: '#/definitions/Error'
  /auctions/{name}:
    get:
      tags:
        - external
        - name_service
      operationId: GetAuctionEntryByName
      description: 'Get auction entry from naming system'
      produces:
        - application/json
      parameters:
        - in: path
          name: name
          description: 'The name key of the name entry'
          required: true
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/AuctionEntry'
        '400':
          description: 'Invalid name'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Name not found'
          schema:
            $ref: '#/definitions/Error'
  /blocks/top:
    get:
      tags:
        - external
        - chain
      operationId: GetTopBlock
      description: 'Get the top block (either key or micro block)'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/KeyBlockOrMicroBlockHeader'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /channels/{pubkey}:
    get:
      tags:
        - external
        - channel
      operationId: GetChannelByPubkey
      description: 'Get channel by public key'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The pubkey of the channel'
          required: true
          # Encoded channel id 'ch_...'
          # pattern: "^ch_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Channel'
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Channel not found'
          schema:
            $ref: '#/definitions/Error'
  /contracts/{pubkey}:
    get:
      tags:
        - external
        - contract
      operationId: GetContract
      description: 'Get a contract by pubkey'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The pubkey of the contract'
          required: true
          # Encoded contract pubkey 'ct_...'
          # pattern: "^ct_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/ContractObject'
        '400':
          description: 'Invalid pubkey'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Contract not found'
          schema:
            $ref: '#/definitions/Error'
  /contracts/{pubkey}/code:
    get:
      tags:
        - external
        - contract
      operationId: GetContractCode
      description: 'Get contract code by pubkey'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The pubkey of the contract'
          required: true
          # Encoded contract pubkey 'ct_...'
          # pattern: "^ct_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Contract code'
          schema:
            $ref: '#/definitions/ByteCode'
        '400':
          description: 'Invalid pubkey'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Contract not found'
          schema:
            $ref: '#/definitions/Error'
  /contracts/{pubkey}/poi:
    get:
      tags:
        - external
        - contract
      operationId: GetContractPoI
      description: 'Get a proof of inclusion for a contract'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'Contract pubkey to get proof for'
          required: true
          # Encoded contract pubkey 'ct_...'
          # pattern: "^ct_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            $ref: '#/definitions/PoI'
        '400':
          description: Invalid contract key
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Contract not found
          schema:
            $ref: '#/definitions/Error'
  /dry-run:
    post:
      tags:
        - external
        - dry-run
      operationId: 'ProtectedDryRunTxs'
      description: 'Dry-run transactions on top of a given block. Supports all TXs except GAMetaTx, PayingForTx and OffchainTx. The maximum gas limit of all calls is capped. The maximum gas limit per request is a global node setting. Since DryRunCallReq object do not have a mandatory gas field, if not set a default value of 1000000 is being used instead.'
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          description: transactions
          required: true
          schema:
            $ref: '#/definitions/DryRunInput'
      responses:
        '200':
          description: Dry-run result
          schema:
            $ref: '#/definitions/DryRunResults'
        '400':
          description: Invalid input
          schema:
            $ref: '#/definitions/Error'
        '403':
          description: Over the gas limit
          schema:
            $ref: '#/definitions/Error'
  /generations/current:
    get:
      tags:
        - external
        - chain
      operationId: GetCurrentGeneration
      description: 'Get the current generation'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Generation'
        '404':
          description: 'Generation not found'
          schema:
            $ref: '#/definitions/Error'
  /generations/hash/{hash}:
    get:
      tags:
        - external
        - chain
      operationId: GetGenerationByHash
      description: 'Get a generation by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the generation'
          required: true
          # Encoded key block hash 'kh_...'
          # pattern: "^kh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Generation'
        '400':
          description: 'Invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Generation not found'
          schema:
            $ref: '#/definitions/Error'
  /generations/height/{height}:
    get:
      tags:
        - external
        - chain
      operationId: GetGenerationByHeight
      description: 'Get a generation by height'
      produces:
        - application/json
      parameters:
        - in: path
          name: height
          description: 'The height'
          required: true
          # UInt64
          type: integer
          minimum: 0
          maximum: 18446744073709551615
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/Generation'
        '404':
          description: 'Generation not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/current:
    get:
      tags:
        - external
        - chain
      operationId: GetCurrentKeyBlock
      description: 'Get the current key block'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/KeyBlock'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/current/hash:
    get:
      tags:
        - external
        - chain
      operationId: GetCurrentKeyBlockHash
      description: 'Get the hash of the current key block'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            type: object
            properties:
              hash:
                $ref: '#/definitions/EncodedHash'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/current/height:
    get:
      tags:
        - external
        - chain
      operationId: GetCurrentKeyBlockHeight
      description: 'Get the height of the current key block'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            type: object
            properties:
              height:
                $ref: '#/definitions/UInt64'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/hash/{hash}:
    get:
      tags:
        - external
        - chain
      operationId: GetKeyBlockByHash
      description: 'Get a key block by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded key block hash
          # pattern: "^kh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/KeyBlock'
        '400':
          description: 'Invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/height/{height}:
    get:
      tags:
        - external
        - chain
      operationId: GetKeyBlockByHeight
      description: 'Get a key block by height'
      produces:
        - application/json
      parameters:
        - in: path
          name: height
          description: 'The height'
          required: true
          # UInt64
          type: integer
          minimum: 0
          maximum: 18446744073709551615
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/KeyBlock'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /key-blocks/pending:
    get:
      tags:
        - external
        - chain
      operationId: GetPendingKeyBlock
      description: 'Get the pending key block'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/KeyBlock'
        '400':
          description: 'Beneficiary not configured'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /micro-blocks/hash/{hash}/header:
    get:
      tags:
        - external
        - chain
      operationId: GetMicroBlockHeaderByHash
      description: 'Get a micro block header by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded micro block hash 'mh_...'
          # pattern: "^mh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/MicroBlockHeader'
        '400':
          description: 'Invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /micro-blocks/hash/{hash}/transactions:
    get:
      tags:
        - external
        - chain
      operationId: GetMicroBlockTransactionsByHash
      description: 'Get micro block transactions by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded micro block hash 'mh_...'
          # pattern: "^mh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/GenericTxs'
        '400':
          description: 'Invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /micro-blocks/hash/{hash}/transactions/count:
    get:
      tags:
        - external
        - chain
      operationId: GetMicroBlockTransactionsCountByHash
      description: 'Get micro block transaction count by hash'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded micro block hash 'mh_...'
          # pattern: "^mh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            type: object
            properties:
              count:
                description: 'Count'
                $ref: '#/definitions/UInt32'
        '400':
          description: 'Invalid hash'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /micro-blocks/hash/{hash}/transactions/index/{index}:
    get:
      tags:
        - external
        - chain
      operationId: GetMicroBlockTransactionByHashAndIndex
      description: 'Get a micro block transaction by hash and index'
      produces:
        - application/json
      parameters:
        - in: path
          name: hash
          description: 'The hash of the block'
          required: true
          # Encoded micro block hash 'mh_...'
          # pattern: "^mh_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: path
          name: index
          description: 'The index of the transaction in a block'
          required: true
          type: integer
          minimum: 1
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/GenericSignedTx'
        '400':
          description: 'Invalid hash or index'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Block not found'
          schema:
            $ref: '#/definitions/Error'
  /names/{name}:
    get:
      tags:
        - external
        - name_service
      operationId: GetNameEntryByName
      description: 'Get name entry from naming system'
      produces:
        - application/json
      parameters:
        - in: path
          name: name
          description: 'The name key of the name entry'
          required: true
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/NameEntry'
        '400':
          description: 'Invalid name'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Name not found'
          schema:
            $ref: '#/definitions/Error'
  /oracles/{pubkey}:
    get:
      tags:
        - external
        - oracle
      operationId: GetOracleByPubkey
      description: 'Get an oracle by public key'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the oracle'
          required: true
          # Encoded oracle pubkey 'ok_...'
          # pattern: "^ok_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/RegisteredOracle'
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Oracle not found'
          schema:
            $ref: '#/definitions/Error'
  /oracles/{pubkey}/queries:
    get:
      tags:
        - external
        - oracle
      operationId: GetOracleQueriesByPubkey
      description: 'Get oracle queries by public key'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the oracle'
          required: true
          # Encoded oracle pubkey 'ok_...'
          # pattern: "^ok_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: query
          name: from
          description: 'Last query id in previous page'
          required: false
          # Encoded oracle query id 'oq_...'
          # pattern: "^oq_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: query
          name: limit
          description: 'Max number of oracle queries'
          required: false
          type: integer
          minimum: 1
          maximum: 1000
          default: 20
        - in: query
          name: type
          description: 'The type of a query: open, closed or all'
          required: false
          default: all
          type: string
          enum: [open, closed, all]
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/OracleQueries'
        '400':
          description: 'Invalid public key'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Oracle not found'
          schema:
            $ref: '#/definitions/Error'
  /oracles/{pubkey}/queries/{query-id}:
    get:
      tags:
        - external
        - oracle
      operationId: GetOracleQueryByPubkeyAndQueryId
      description: 'Get an oracle query by public key and query ID'
      produces:
        - application/json
      parameters:
        - in: path
          name: pubkey
          description: 'The public key of the oracle'
          required: true
          # Encoded oracle pubkey 'ok_...'
          # pattern: "^ok_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
        - in: path
          name: query-id
          description: 'The ID of the query'
          required: true
          # Encoded oracle query id 'oq_...'
          # pattern: "^oq_[1-9A-HJ-NP-Za-km-z]*$"
          type: string
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/OracleQuery'
        '400':
          description: 'Invalid public key or query ID'
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: 'Oracle query not found'
          schema:
            $ref: '#/definitions/Error'
  /peers/pubkey:
    get:
      tags:
        - external
        - node_info
      operationId: GetPeerPubkey
      description: 'Get peer public key'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/PeerPubKey'
  /recent-gas-prices:
    get:
      tags:
        - external
        - transaction
      operationId: GetRecentGasPrices
      description: 'Get minimum gas prices in recent blocks'
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: 'Successful operation'
          schema:
            $ref: '#/definitions/GasPrices'
        '400':
          description: Not enough/Invalid data for statistics
          schema:
            $ref: '#/definitions/Error'
  /status:
    get:
      tags:
